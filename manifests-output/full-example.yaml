apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    managed-by: k8s-deployment-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: full-app-config
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
data:
  APP_NAME: full-app
  APP_VERSION: 1.0.0
  DB_HOST: postgres-svc
  CACHE_TTL: '300'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: full-app
  namespace: staging
  labels:
    app: full-app
    version: 1.0.0
    managed-by: k8s-deployment-api
  annotations:
    deployment.kubernetes.io/revision: '1'
spec:
  replicas: 3
  selector:
    matchLabels:
      app: full-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: full-app
        version: 1.0.0
    spec:
      serviceAccountName: full-app-sa
      containers:
        - name: full-app
          image: myrepo/myapp:v2.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: full-app-config
          env:
            - name: NODE_ENV
              value: staging
            - name: LOG_LEVEL
              value: debug
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
      securityContext:
        fsGroup: 2000
---
apiVersion: v1
kind: Service
metadata:
  name: full-app-svc
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
spec:
  selector:
    app: full-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: full-app-ingress
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: full-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: full-app-svc
                port:
                  number: 80
  tls:
    - hosts:
        - full-app.example.com
      secretName: full-app-tls
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: full-app-hpa
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: full-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: full-app-netpol
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
spec:
  podSelector:
    matchLabels:
      app: full-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
  egress:
    - {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: full-app-sa
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: full-app-role
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
rules:
  - apiGroups:
      - ''
    resources:
      - configmaps
      - secrets
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: full-app-binding
  namespace: staging
  labels:
    app: full-app
    managed-by: k8s-deployment-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: full-app-role
subjects:
  - kind: ServiceAccount
    name: full-app-sa
    namespace: staging
