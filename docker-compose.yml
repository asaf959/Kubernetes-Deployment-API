version: '3.9'

services:
  api:
    build:
      context: .
      target: production
    container_name: k8s-deployment-api
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
